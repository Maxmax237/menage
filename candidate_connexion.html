<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Espace candidate</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        .back-home { text-align: center; margin-bottom: 20px; }
        .back-home a { color: #667eea; text-decoration: none; }
        .message { margin-top: 15px; padding: 10px; border-radius: 8px; text-align: center; }
        .error { background: #fee; color: #c00; }
        .info { text-align: center; margin-top: 20px; }
        .info a { color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="back-home"><a href="../index.html">← Retour à l'accueil</a></div>
        <h1>🔐 Connexion candidate</h1>
        
        <form id="connexionForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Mot de passe" required>
            <button type="submit">Se connecter</button>
        </form>
        <div id="message"></div>
        <div class="info">
            Pas encore inscrite ? <a href="inscription.html">S'inscrire</a>
        </div>
    </div>

    <script>
        document.getElementById('connexionForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');
            
            let candidates = JSON.parse(localStorage.getItem('menagepro_candidates') || '[]');
            const candidate = candidates.find(c => c.email === email && c.password === password);
            
            if (candidate) {
                if (candidate.status === 'pending') {
                    msg.innerHTML = '<div class="message error">⏳ Votre compte est en attente de validation</div>';
                } else if (candidate.status === 'accepted') {
                    sessionStorage.setItem('candidateLoggedIn', 'true');
                    sessionStorage.setItem('candidateNom', candidate.nom);
                    window.location.href = 'dashboard.html';
                } else if (candidate.status === 'rejected') {
                    msg.innerHTML = '<div class="message error">❌ Votre inscription a été refusée</div>';
                }
            } else {
                msg.innerHTML = '<div class="message error">❌ Email ou mot de passe incorrect</div>';
            }
        });
    </script>
</body>
</html>
