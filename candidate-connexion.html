<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Femme de ménage | MenagePro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        .message { margin-top: 15px; padding: 10px; border-radius: 8px; text-align: center; }
        .error { background: #fee; color: #c00; }
        .success { background: #efe; color: #080; }
        .info { text-align: center; margin-top: 20px; color: #666; }
        .info a { color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Connexion candidate</h1>
        <form id="connexionForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Mot de passe" required>
            <button type="submit">Se connecter</button>
        </form>
        <div id="message"></div>
        <div class="info">
            Pas encore inscrite ? <a href="inscription.html">S'inscrire</a>
        </div>
    </div>

    <script type="module">
        import { auth, db } from '../firebase-config.js';
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const form = document.getElementById('connexionForm');
        const messageDiv = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            messageDiv.innerHTML = '';
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // 1. Authentification
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const uid = userCredential.user.uid;

                // 2. Vérifier le statut dans Firestore
                const docRef = doc(db, "candidates", uid);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    if (data.status === 'pending') {
                        messageDiv.innerHTML = '<div class="message error">⏳ Votre compte est en attente de validation par l\'administrateur.</div>';
                        await auth.signOut();
                        return;
                    } else if (data.status === 'rejected') {
                        messageDiv.innerHTML = '<div class="message error">❌ Votre inscription a été refusée. Contactez-nous pour plus d\'informations.</div>';
                        await auth.signOut();
                        return;
                    } else if (data.status === 'accepted') {
                        sessionStorage.setItem('candidateLoggedIn', 'true');
                        sessionStorage.setItem('candidateUid', uid);
                        sessionStorage.setItem('candidateNom', data.nom);
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    messageDiv.innerHTML = '<div class="message error">❌ Compte non trouvé</div>';
                }
                
            } catch (error) {
                console.error(error);
                if (error.code === 'auth/invalid-credential') {
                    messageDiv.innerHTML = '<div class="message error">❌ Email ou mot de passe incorrect</div>';
                } else {
                    messageDiv.innerHTML = `<div class="message error">❌ Erreur: ${error.message}</div>`;
                }
            }
        });
    </script>
</body>
</html>
