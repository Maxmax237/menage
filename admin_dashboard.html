<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
        }
        header {
            background: linear-gradient(135deg, #1e1e2f 0%, #2d2d44 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }
        .stat-number { font-size: 32px; font-weight: bold; color: #667eea; }
        table {
            width: 100%;
            background: white;
            border-radius: 15px;
            overflow: hidden;
        }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; }
        .btn-accept { background: #10b981; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; }
        .btn-reject { background: #ef4444; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; }
        .status-pending { background: #fef3c7; color: #92400e; padding: 4px 8px; border-radius: 20px; font-size: 12px; }
        .status-accepted { background: #d1fae5; color: #065f46; padding: 4px 8px; border-radius: 20px; font-size: 12px; }
        .logout-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <h1>👑 MenagePro - Administration</h1>
        <button class="logout-btn" onclick="logout()">Déconnexion</button>
    </header>
    <div class="container">
        <div class="stats" id="stats"></div>
        <div style="overflow-x: auto;">
            <table>
                <thead><tr><th>Nom</th><th>Email</th><th>Téléphone</th><th>Ville</th><th>Expérience</th><th>Statut</th><th>Actions</th></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
    <script>
        function loadDashboard() {
            let candidates = JSON.parse(localStorage.getItem('menagepro_candidates') || '[]');
            const pending = candidates.filter(c => c.status === 'pending').length;
            const accepted = candidates.filter(c => c.status === 'accepted').length;
            const rejected = candidates.filter(c => c.status === 'rejected').length;
            
            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><div class="stat-number">${candidates.length}</div><div>Total</div></div>
                <div class="stat-card"><div class="stat-number">${pending}</div><div>En attente</div></div>
                <div class="stat-card"><div class="stat-number">${accepted}</div><div>Validées</div></div>
                <div class="stat-card"><div class="stat-number">${rejected}</div><div>Refusées</div></div>
            `;
            
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = candidates.map(c => `
                <tr>
                    <td>${c.nom}</td>
                    <td>${c.email}</td>
                    <td>${c.telephone}</td>
                    <td>${c.ville}</td>
                    <td>${c.experience} an(s)</td>
                    <td><span class="status-${c.status}">${c.status === 'pending' ? 'En attente' : c.status === 'accepted' ? 'Validée' : 'Refusée'}</span></td>
                    <td>
                        ${c.status === 'pending' ? `
                            <button class="btn-accept" onclick="updateStatus(${c.id}, 'accepted')">Accepter</button>
                            <button class="btn-reject" onclick="updateStatus(${c.id}, 'rejected')">Refuser</button>
                        ` : c.status === 'accepted' ? `
                            <button class="btn-reject" onclick="updateStatus(${c.id}, 'rejected')">Refuser</button>
                        ` : `
                            <button class="btn-accept" onclick="updateStatus(${c.id}, 'accepted')">Accepter</button>
                        `}
                    </td>
                </tr>
            `).join('');
        }
        
        function updateStatus(id, newStatus) {
            let candidates = JSON.parse(localStorage.getItem('menagepro_candidates') || '[]');
            const index = candidates.findIndex(c => c.id === id);
            if (index !== -1) {
                candidates[index].status = newStatus;
                localStorage.setItem('menagepro_candidates', JSON.stringify(candidates));
                loadDashboard();
            }
        }
        
        function logout() {
            sessionStorage.clear();
            window.location.href = 'login.html';
        }
        
        // Vérifier connexion
        if (!sessionStorage.getItem('adminLoggedIn')) {
            window.location.href = 'login.html';
        }
        
        loadDashboard();
    </script>
</body>
</html>
